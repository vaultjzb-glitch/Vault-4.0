@import url('https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&family=Courier+Prime:wght@400;700&family=Sora:wght@300;400;500&display=swap');

:root {
  --bg: #080910;
  --s1: #0e0f16;
  --s2: #14151f;
  --s3: #1a1b28;
  --b1: #252636;
  --b2: #2f3048;
  --cyan: #00e5ff;
  --purple: #7b61ff;
  --green: #00ff88;
  --red: #ff4466;
  --amber: #ffaa00;
  --text: #dde1f0;
  --muted: #4a4d6b;
  --muted2: #6b6f8e;
  --mono: 'Courier Prime', monospace;
  --head: 'Rajdhani', sans-serif;
  --body: 'Sora', sans-serif;
  --safe-bottom: env(safe-area-inset-bottom, 0px);
  --safe-top: env(safe-area-inset-top, 0px);
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { height: 100%; }
body {
  background: var(--bg);
  color: var(--text);
  font-family: var(--body);
  height: 100%;
  display: flex;
  flex-direction: column;
  overflow: hidden;
  padding-top: var(--safe-top);
  padding-bottom: var(--safe-bottom);
}

body::before {
  content: '';
  position: fixed; inset: 0;
  background-image:
    linear-gradient(rgba(0,229,255,0.018) 1px, transparent 1px),
    linear-gradient(90deg, rgba(0,229,255,0.018) 1px, transparent 1px);
  background-size: 44px 44px;
  pointer-events: none; z-index: 0;
}
body::after {
  content: '';
  position: fixed; inset: 0;
  background: repeating-linear-gradient(0deg, transparent, transparent 3px, rgba(0,0,0,0.025) 3px, rgba(0,0,0,0.025) 4px);
  pointer-events: none; z-index: 1000;
}

/* \u2550\u2550\u2550 BOOT \u2550\u2550\u2550 */
#boot {
  position: fixed; inset: 0;
  background: var(--bg);
  z-index: 900;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  padding: 40px 32px;
  transition: opacity 0.6s ease, transform 0.6s ease;
}
#boot.out { opacity: 0; transform: scale(1.03); pointer-events: none; }

.boot-logo {

  line-height: 1;
  animation: logoFlicker 5s infinite;
}

  0%,94%,100%{opacity:1;} 95%{opacity:.8;} 96%{opacity:1;} 98%{opacity:.85;}
}
.boot-tagline {
  font-family: var(--mono);
  font-size: 10px;
  color: var(--muted2);
  letter-spacing: 0.3em;
  margin-top: 6px; margin-bottom: 48px;
  text-transform: uppercase;
}
.boot-log {
  width: 100%; max-width: 400px;

  display: flex; flex-direction: column; gap: 7px;
